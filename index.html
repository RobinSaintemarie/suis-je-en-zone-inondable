<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulateur Inondation - Les 2 Morin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        
        #wrapper { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 1000; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            width: 320px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }

        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-container img { max-width: 150px; height: auto; }

        h2 { font-size: 18px; color: #2c3e50; margin: 0 0 15px 0; text-align: center; font-weight: 600; }

        /* Conteneur de recherche */
        .search-container { position: relative; margin-bottom: 15px; }
        
        input { 
            width: 100%;
            padding: 10px 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        input:focus { border-color: #3182ce; }

        /* Liste des suggestions prédictives */
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin: 0;
            padding: 0;
            list-style: none;
            display: none;
        }
        .suggestions-list li {
            padding: 10px 12px;
            font-size: 13px;
            color: #4a5568;
            cursor: pointer;
            border-bottom: 1px solid #f7fafc;
        }
        .suggestions-list li:hover { background: #ebf8ff; color: #2b6cb0; }

        #resultat { 
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            background: #f7fafc;
            border: 1px solid #edf2f7;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <div class="logo-container">
            <img src="https://cdn-icons-png.flaticon.com/512/4005/4005743.png" alt="Logo">
        </div>
        
        <h2>Simulateur Inondation</h2>
        
        <div class="search-container">
            <input type="text" id="adresseInput" placeholder="Tapez votre adresse ici..." oninput="autoCompletion()" autocomplete="off">
            <ul id="suggestions" class="suggestions-list"></ul>
        </div>
        
        <div id="resultat">Chargement de la carte...</div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Centrage sur le SMAGE des 2 Morin
        var map = L.map('map').setView([48.815, 3.185], 10);
        
        // Fond de carte satellite Esri
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        var coucheInondation = null;
        var marqueurActuel = null;

        // Chargement du fichier zones.json
        fetch('zones.json')
            .then(response => {
                if (!response.ok) throw new Error("Fichier introuvable");
                return response.json();
            })
            .then(data => {
                coucheInondation = L.geoJSON(data, {
                    style: { color: '#ff3333', fillColor: '#ff3333', fillOpacity: 0.4, weight: 1.5 }
                }).addTo(map);
                document.getElementById('resultat').innerHTML = "<span style='color: #000000;'>Entrez votre adresse</span>";
            })
            .catch(err => {
                document.getElementById('resultat').innerHTML = "<span style='color:orange;'>❌ Erreur : Fichier cartographique introuvable.</span>";
            });

        // Algorithme de calcul natif (Ray-casting)
        function pointDansPolygone(point, polygone) {
            var x = point[0], y = point[1];
            var inside = false;
            for (var i = 0, j = polygone.length - 1; i < polygone.length; j = i++) {
                var xi = polygone[i][0], yi = polygone[i][1];
                var xj = polygone[j][0], yj = polygone[j][1];
                var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function analyserGeoJSON(coords, geojson) {
            if (!geojson || !geojson.features) return false;
            for (var f = 0; f < geojson.features.length; f++) {
                var feature = geojson.features[f];
                if (!feature.geometry) continue;
                var type = feature.geometry.type;
                var coordinates = feature.geometry.coordinates;

                if (type === "Polygon") {
                    if (pointDansPolygone(coords, coordinates[0])) return true;
                } else if (type === "MultiPolygon") {
                    for (var p = 0; p < coordinates.length; p++) {
                        if (pointDansPolygone(coords, coordinates[p][0])) return true;
                    }
                }
            }
            return false;
        }

        // FONCTION AUTO-COMPLÉTION (Saisie prédictive)
        function autoCompletion() {
            var input = document.getElementById('adresseInput').value;
            var liste = document.getElementById('suggestions');
            
            if (input.length < 4) {
                liste.style.display = "none";
                return;
            }

            // Requête à l'API Adresse (limitée à 5 résultats pour la fluidité)
            fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(input)}&limit=5`)
            .then(response => response.json())
            .then(data => {
                liste.innerHTML = "";
                if (data.features && data.features.length > 0) {
                    liste.style.display = "block";
                    data.features.forEach(feature => {
                        var li = document.createElement('li');
                        li.innerText = feature.properties.label;
                        
                        // Quand on clique sur une suggestion de la liste
                        li.onclick = function() {
                            document.getElementById('adresseInput').value = feature.properties.label;
                            liste.style.display = "none";
                            executerDiagnostic(feature);
                        };
                        liste.appendChild(li);
                    });
                } else {
                    liste.style.display = "none";
                }
            })
            .catch(() => { liste.style.display = "none"; });
        }

        // Fermer la liste si on clique en dehors de la barre de recherche
        document.addEventListener("click", function(e) {
            if (e.target.id !== "adresseInput") {
                document.getElementById('suggestions').style.display = "none";
            }
        });

        // FONCTION DIAGNOSTIC (Lancée automatiquement après le choix de l'adresse)
        function executerDiagnostic(feature) {
            document.getElementById('resultat').innerHTML = "Analyse en cours...";

            var coords = feature.geometry.coordinates; // [Longitude, Latitude]
            var latLng = [coords[1], coords[0]];
            var label = feature.properties.label;

            // Nettoyage de l'ancien marqueur s'il y en a un
            if (marqueurActuel) { map.removeLayer(marqueurActuel); }

            // Positionnement de la carte et du marqueur
            map.setView(latLng, 17);
            marqueurActuel = L.marker(latLng).addTo(map).bindPopup(label).openPopup();

            // Calcul spatial
            var estInonde = false;
            if (coucheInondation) {
                var rawData = coucheInondation.toGeoJSON();
                estInonde = analyserGeoJSON(coords, rawData);
            }

            var divResultat = document.getElementById('resultat');
            if (estInonde) {
                divResultat.innerHTML = `
                    <div style="color:#c53030; margin-bottom: 10px; font-weight: bold;">⚠️ ATTENTION : Terrain situé en zone de débordement de cours d'eau</div>
                    <div style="font-size: 12px; color: #4a5568; font-weight: normal; text-align: left; line-height: 1.4; border-top: 1px solid #e2e8f0; padding-top: 10px; margin-top: 10px;">
                        <strong>Protégez votre habitat avec DIAG'SMAGE !</strong><br>
                        Les études indiquent que ce terrain est exposé aux crues. Le SMAGE des 2 Morin vous accompagne gratuitement pour réaliser un diagnostic de vulnérabilité de votre logement et vous proposer des solutions adaptées face au risque inondation.
                    </div>
                    <a href="https://www.smage2morin.fr/formulaire-diag-vulnerabilite/" target="_blank" style="display: block; margin-top: 12px; padding: 8px; background: #e53e3e; color: white; text-decoration: none; border-radius: 6px; font-size: 13px; text-align: center; font-weight: bold;">
                        M'inscrire au diagnostic gratuit
                    </a>
                `;
            } else {
                divResultat.innerHTML = `
                    <div style="color:#2f855a; margin-bottom: 8px;">✅ Hors zone de débordement détectée</div>
                    <div style="font-size: 11px; color: #4a5568; font-weight: normal; text-align: left; line-height: 1.4; border-top: 1px solid #e2e8f0; padding-top: 8px; margin-top: 8px;">
                        <em>Note :</em> Ce résultat se base uniquement sur les études de <strong>débordement de cours d'eau</strong>. Ce terrain peut tout de même être concerné par d'autres phénomènes non cartographiés ici, comme le <strong>ruissellement</strong> ou les <strong>remontées de nappes phréatiques</strong>.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
