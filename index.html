<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulateur Inondation - Les 2 Morin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        
        /* Relooking complet du panneau blanc */
        #wrapper { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 1000; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); 
            width: 320px;
            box-sizing: border-box;
            backdrop-filter: blur(5px); /* Effet de flou moderne à l'arrière du panneau */
        }

        /* Style du Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }
        .logo-container img {
            max-width: 150px; /* Ajuste la largeur max du logo */
            height: auto;
        }

        h2 { 
            font-size: 18px; 
            color: #2c3e50; 
            margin: 0 0 15px 0; 
            text-align: center;
            font-weight: 600;
        }

        /* Style de la barre de recherche */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        input { 
            flex: 1;
            padding: 10px 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #3182ce; /* Bordure bleue quand on clique dedans */
        }

        /* Style du bouton */
        button { 
            padding: 10px 16px; 
            background: #3182ce; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 14px;
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover {
            background: #2b6cb0; /* Bleu plus foncé au survol */
        }

        /* Style de la zone de résultat */
        #resultat { 
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            background: #f7fafc;
            border: 1px solid #edf2f7;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <div class="logo-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWk87ZmVBbO60zUnQmOq8XpDaXenKQ0dhefw&s" alt="Logo">
        </div>
        
        <h2>Simulateur Inondation</h2>
        
        <div class="search-box">
            <input type="text" id="adresseInput" placeholder="Ex: 10 rue de la Paix, Coulommiers">
            <button onclick="rechercherAdresse()">Tester</button>
        </div>
        
        <div id="resultat">Chargement de la carte...</div>
    </div>
    
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        var map = L.map('map').setView([48.815, 3.185], 10);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
}).addTo(map);

        var coucheInondation = null;

        // Chargement du fichier zones.json
        fetch('zones.json')
            .then(response => {
                if (!response.ok) throw new Error("Fichier introuvable");
                return response.json();
            })
            .then(data => {
                coucheInondation = L.geoJSON(data, {
                    style: { color: 'red', fillColor: '#ff3333', fillOpacity: 0.3, weight: 1 }
                }).addTo(map);
                document.getElementById('resultat').innerHTML = "<span style='color:blue;'>Prêt : Entrez une adresse.</span>";
            })
            .catch(err => {
                document.getElementById('resultat').innerHTML = "<span style='color:orange;'>❌ Erreur : Le fichier 'zones.json' n'a pas pu être chargé.</span>";
            });

        // Fonction géométrique universelle (Ray-casting natif en JavaScript)
        function pointDansPolygone(point, polygone) {
            var x = point[0], y = point[1];
            var inside = false;
            for (var i = 0, j = polygone.length - 1; i < polygone.length; j = i++) {
                var xi = polygone[i][0], yi = polygone[i][1];
                var xj = polygone[j][0], yj = polygone[j][1];
                var intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function analyserGeoJSON(coords, geojson) {
            if (!geojson || !geojson.features) return false;
            
            // On parcourt chaque polygone du fichier un par un
            for (var f = 0; f < geojson.features.length; f++) {
                var feature = geojson.features[f];
                if (!feature.geometry) continue;
                
                var type = feature.geometry.type;
                var coordinates = feature.geometry.coordinates;

                if (type === "Polygon") {
                    // Premier anneau = le contour extérieur du polygone
                    if (pointDansPolygone(coords, coordinates[0])) return true;
                } else if (type === "MultiPolygon") {
                    for (var p = 0; p < coordinates.length; p++) {
                        if (pointDansPolygone(coords, coordinates[p][0])) return true;
                    }
                }
            }
            return false;
        }

        function rechercherAdresse() {
            var input = document.getElementById('adresseInput').value;
            if(!input) return;

            document.getElementById('resultat').innerHTML = "Recherche en cours...";

            fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(input)}&limit=1`)
            .then(response => response.json())
            .then(data => {
                if(data.features && data.features.length > 0) {
                    var coords = data.features[0].geometry.coordinates; // [Longitude, Latitude]
                    var latLng = [coords[1], coords[0]]; // [Latitude, Longitude]

                    // Placer le marqueur
                    map.setView(latLng, 16);
                    L.marker(latLng).addTo(map).bindPopup(input).openPopup();

                    // Lancement de notre propre moteur de calcul (indépendant des bibliothèques web)
                    var estInonde = false;
                    if (coucheInondation) {
                        var rawData = coucheInondation.toGeoJSON();
                        estInonde = analyserGeoJSON(coords, rawData);
                    }

                    var divResultat = document.getElementById('resultat');
                    if(estInonde) {
                        divResultat.innerHTML = "<span style='color:red;'>⚠️ ATTENTION : En zone inondable !</span>";
                    } else {
                        divResultat.innerHTML = "<span style='color:green;'>✅ RAS : Hors de la zone détectée.</span>";
                    }
                } else {
                    document.getElementById('resultat').innerHTML = "Adresse introuvable.";
                }
            })
            .catch(err => {
                document.getElementById('resultat').innerHTML = "<span style='color:red;'>Erreur technique de géolocalisation.</span>";
            });
        }
    </script>
</body>
</html>
